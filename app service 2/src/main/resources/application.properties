spring.application.name=app-service2
server.port=5030

# 1. File placement and naming
logging.file.name=logs/app-service-2.log	

# 2. File rotation (Set to 10MB as requested)
logging.logback.rollingpolicy.max-file-size=10MB

# 3. Log levels
logging.level.root=DEBUG

# 4. Pattern customization
# FIX: Removed the duplicate duplicate/broken pattern line. The rule below is clean and safe.
logging.pattern.level=%5p [${spring.application.name:-}]

# 5. Spring Boot Admin Client Configuration
spring.boot.admin.client.url=http://localhost:7090
spring.boot.admin.client.instance.prefer-ip=true

management.endpoint.logfile.external-file=logs/app-service-2.log

# 6. Actuator & Endpoint Security Management
management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=ALWAYS
management.info.env.enabled=true